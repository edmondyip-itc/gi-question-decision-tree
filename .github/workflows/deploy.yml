name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v3
              with:
                  node-version: '20'
                  cache: 'npm'
            
            - run: npm ci
            - run : npm run build

            - uses: actiions/updload-pages-artifact@v1
              with:
                  path: dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            -   id: deployment
                uses: actions/download-pages@v4